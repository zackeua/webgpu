<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Demo</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>WebGPU Demo</h1>
    <!-- Menu for choosing simulation options -->
    <div id="menu">
        <label for="simulation-select">Choose a simulation:</label>
        <select id="simulation-select">
            <option value="option1">Simulation Option 1</option>
            <option value="option2">Simulation Option 2</option>
            <option value="option3">Simulation Option 3</option>
        </select>
        <!-- Timestep size -->
        <input type="number" id="timestep-size" value="0.01" step="0.01" min="0">
        <label for="timestep-size">Timestep Size</label>
        <br>

        <!-- Button to trigger rendering -->
        <button id="render-button">Render with WebGPU</button>
    </div>
    <!-- Canvas for WebGPU rendering -->
    <canvas id="webgpu-canvas" width="800" height="800"></canvas>
</body>
</html>
