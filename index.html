<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Demo</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>WebGPU Demo</h1>
            <p class="subtitle">Select a mode and tune the settings for each simulation.</p>
        </header>

        <div id="menu" class="panel">
            <div class="tabs" role="tablist">
                <button class="tab active" data-simulation="Advection equation">Advection</button>
                <button class="tab" data-simulation="Game of Life">Game of Life</button>
                <button class="tab" data-simulation="Simulation Option 3">Option 3</button>
            </div>

            <div id="config-panel">
                <div class="config active" id="config-advection">
                    <div class="field">
                        <label for="advection-timestep">Timestep</label>
                        <input type="number" id="advection-timestep" value="0.0001" step="0.0001" min="0">
                    </div>
                    <div class="field">
                        <label for="diffusion">Diffusion</label>
                        <input type="number" id="diffusion" value="0.0002" step="0.0001" min="0">
                    </div>
                    <div class="field-inline">
                        <div class="field">
                            <label for="velocity-x">Velocity X</label>
                            <input type="number" id="velocity-x" value="0.2" step="0.05">
                        </div>
                        <div class="field">
                            <label for="velocity-y">Velocity Y</label>
                            <input type="number" id="velocity-y" value="0.05" step="0.05">
                        </div>
                    </div>
                </div>

                <div class="config" id="config-gol">
                    <div class="field">
                        <label for="gol-timestep">Timestep</label>
                        <input type="number" id="gol-timestep" value="0.05" step="0.01" min="0">
                    </div>
                    <div class="field">
                        <label for="gol-density">Initial density</label>
                        <input type="number" id="gol-density" value="0.5" step="0.05" min="0" max="1">
                    </div>
                </div>

                <div class="config" id="config-option3">
                    <div class="field">
                        <label for="option3-timestep">Timestep</label>
                        <input type="number" id="option3-timestep" value="0.01" step="0.01" min="0">
                    </div>
                    <div class="field note">
                        <p>Option 3 is a placeholder mode. Customize this panel for your next simulation.</p>
                    </div>
                </div>
            </div>

            <button id="render-button">Start simulation</button>
            <div id="status" class="status info">Choose a simulation and press Start.</div>
        </div>

        <div id="canvas-wrapper">
            <canvas id="webgpu-canvas" width="800" height="800"></canvas>
        </div>
    </div>
</body>
</html>
